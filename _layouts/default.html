<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    .site-header {
      background-color: #e8f5ee !important;
      border-bottom: 2px solid #4a9e6b !important;
      padding: 10px 0;
    }
    .site-title, .site-title:visited {
      color: #2d7a4f !important;
      font-weight: bold;
    }
    .site-nav .page-link {
      color: #2d7a4f !important;
    }
    .site-footer {
      background-color: #e8f5ee !important;
      border-top: 2px solid #4a9e6b !important;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="/">{{ site.title }}</a>
      <nav class="site-nav">
        {% for page in site.header_pages %}
          {% assign node = site.pages | where: "path", page | first %}
          <a class="page-link" href="{{ node.url | relative_url }}">{{ node.title }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>
  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>
  <footer class="site-footer">
    <div class="wrapper">
      <p>{{ site.title }} — {{ site.description }}</p>
    </div>
  </footer>
</body>
</html>
